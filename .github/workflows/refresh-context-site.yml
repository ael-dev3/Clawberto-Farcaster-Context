name: Refresh Farcaster Context Site

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Python deps
        run: python -m pip install -r requirements.txt

      - name: Install Node deps
        run: npm ci

      - name: Refresh data and site artifacts
        run: npm run refresh

      - name: Validate build
        run: npm run build

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html generated public/generated
          if git diff --cached --quiet; then
            echo "No refreshed artifacts changed."
          else
            git commit -m "[cron] refresh Farcaster context site"
            git push
          fi
